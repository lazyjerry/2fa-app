name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  secure2fa:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: secure2fa

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: secure2fa/go.mod
          cache-dependency-path: secure2fa/go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: secure2fa/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: secure2fa/frontend

      - name: Audit frontend dependencies
        run: npm audit --audit-level=moderate
        working-directory: secure2fa/frontend

      - name: Run Go tests
        run: go test ./...

      - name: Build frontend
        run: npm run build
        working-directory: secure2fa/frontend

      - name: Build macOS unsigned package
        run: bash scripts/package-macos.sh
        env:
          MACOS_PLATFORM: darwin/universal

      - name: Upload macOS package
        uses: actions/upload-artifact@v4
        with:
          name: secure2fa-macos-unsigned
          path: |
            secure2fa/build/release/secure2fa.app
            secure2fa/build/release/*.zip
          if-no-files-found: error
